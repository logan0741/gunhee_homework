<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>SpamCheck v2</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
  textarea { width: 100%; box-sizing: border-box; }
  button { margin-top: 8px; padding: 8px 20px; cursor: pointer; }
  #result { margin-top: 20px; padding: 16px; border-radius: 8px; font-size: 1.1em; }
  .spam { background: #ffe0e0; border: 2px solid #e53935; color: #b71c1c; }
  .ham  { background: #e0f4e0; border: 2px solid #43a047; color: #1b5e20; }
  #model-badge { font-size: 0.8em; color: #888; margin-top: 8px; }
</style>
</head>
<body>
<h2>SpamCheck</h2>
<textarea id="text" rows="5" placeholder="Win a FREE prize now"></textarea><br>
<button onclick="classify()">Classify</button>
<div id="result"></div>
<div id="model-badge"></div>

<script>
async function classify() {
  const text = document.getElementById("text").value.trim();
  if (!text) {
    showResult("Please enter text to classify.", null);
    return;
  }
  try {
    const res = await fetch("/classify", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text })
    });
    if (!res.ok) throw new Error("Request failed");
    const data = await res.json();
    const pct = (data.score * 100).toFixed(1);
    showResult(`Result: ${data.label.toUpperCase()} (spam score: ${pct}%)`, data.label);
    fetchModelInfo();
  } catch {
    showResult("Request failed.", null);
  }
}

function showResult(msg, label) {
  const el = document.getElementById("result");
  el.textContent = msg;
  el.className = label === "spam" ? "spam" : (label === "ham" ? "ham" : "");
}

async function fetchModelInfo() {
  try {
    const res = await fetch("/model/info");
    const data = await res.json();
    document.getElementById("model-badge").textContent = `Model: ${data.model_version}`;
  } catch {}
}

fetchModelInfo();
</script>
</body>
</html>
