name: Auto Promote Model

on:
  workflow_dispatch:
    inputs:
      accuracy_threshold:
        description: "Minimum accuracy to promote to Production"
        default: "0.90"
        required: false

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start MLFlow tracking server
        run: |
          mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db &
          sleep 5

      - name: Train and evaluate model
        env:
          MLFLOW_TRACKING_URI: http://localhost:5000
        run: python train.py

      - name: Promote best model if accuracy meets threshold
        env:
          MLFLOW_TRACKING_URI: http://localhost:5000
          ACCURACY_THRESHOLD: ${{ github.event.inputs.accuracy_threshold || '0.90' }}
        run: |
          python scripts/promote.py
