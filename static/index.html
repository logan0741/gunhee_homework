
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>스팸 판별기</title>
<h1>스팸 판별기</h1>
</head>
<body>
<textarea id="text" rows="5" cols="60"
placeholder="Win a FREE prize now"></textarea><br><br>
<button onclick="classify()">분류</button>
<h3 id="result"></h3>
<script>
function classify() {
const text = document.getElementById("text").value;
fetch("/classify", {
method: "POST",
body: JSON.stringify({text})
})
.then(res => res.json())
.then(data => {
document.getElementById("result").innerText =
"결과: " + data.label + " (score=" + data.score + ")";
})
.catch(() => {
document.getElementById("result").innerText = "에러 발생";
});
}
</script>
</body>
</html>
